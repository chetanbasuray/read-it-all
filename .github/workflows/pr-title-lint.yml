name: PR Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            build
            ci
            perf
            style
            revert

  lint-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name is feat/* or fix/*
        run: |
          if [[ ! "${{ github.head_ref }}" =~ ^(feat|fix)/.+ ]]; then
            echo "Branch '${{ github.head_ref }}' must start with feat/ or fix/"
            exit 1
          fi
